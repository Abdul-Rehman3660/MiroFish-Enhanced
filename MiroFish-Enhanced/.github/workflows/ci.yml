name: MiroFish Enhanced CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint --if-present

  check-backend:
    name: Check Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Check Python syntax
        working-directory: backend
        run: |
          source .venv/bin/activate
          python -m py_compile app/config.py
          python -m py_compile app/utils/llm_client.py
          echo "Syntax check passed!"

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          test -f README-EN.md && echo "README-EN.md exists"
          test -f CONTRIBUTING.md && echo "CONTRIBUTING.md exists"
          test -f docs/quickstart.md && echo "quickstart.md exists"
          test -f docs/windows-setup.md && echo "windows-setup.md exists"
          test -f docs/troubleshooting.md && echo "troubleshooting.md exists"
          test -f docs/api-keys.md && echo "api-keys.md exists"
          test -f docs/free-llm-options.md && echo "free-llm-options.md exists"
          test -f docs/cost-guide.md && echo "cost-guide.md exists"
          test -f scripts/cost_estimator.py && echo "cost_estimator.py exists"
          test -f scripts/windows/setup.ps1 && echo "setup.ps1 exists"
          echo "All required files present!"

      - name: Check .env.example is not .env
        run: |
          if grep -q "your_api_key_here" .env.example; then
            echo ".env.example correctly has placeholder values"
          else
            echo "WARNING: .env.example may have real API keys!"
            exit 1
          fi
